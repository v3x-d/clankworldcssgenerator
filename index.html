<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLANK.STUDIO // Visual Architect</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(20, 20, 25, 0.8);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --text: #e0e0e0;
            --border: rgba(255, 255, 255, 0.1);
            --sidebar-w: 320px;
            --glass: blur(12px) saturate(180%);
        }

        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* UI LAYOUT */
        #app { display: flex; flex-direction: column; height: 100vh; }
        
        header {
            height: 60px;
            background: rgba(10, 10, 15, 0.9);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            z-index: 100;
        }

        .logo { font-weight: 800; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
        
        .top-nav { display: flex; gap: 10px; }
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .btn:hover { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent-glow); }
        .btn.active { border-color: var(--accent); background: rgba(0, 242, 255, 0.1); }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* SIDEBARS */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--panel);
            backdrop-filter: var(--glass);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            z-index: 50;
        }

        .tabs-content { flex: 1; overflow-y: auto; padding: 20px; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .group { margin-bottom: 25px; }
        .group label { display: block; font-size: 11px; text-transform: uppercase; opacity: 0.6; margin-bottom: 8px; letter-spacing: 1px; }

        /* PREVIEW AREA */
        #canvas-wrapper {
            flex: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: auto;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #preview-container {
            width: 100%;
            max-width: 1200px;
            min-height: 800px;
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            transform-origin: top center;
        }

        /* CODE EXPORT PANEL */
        #export-panel {
            width: 400px;
            background: #0a0a0a;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        pre { flex: 1; margin: 0; padding: 15px; font-family: monospace; font-size: 11px; overflow: auto; color: #888; background: #050505; }

        /* INPUT STYLES */
        input[type="text"], select, input[type="number"] {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .color-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        input[type="color"] { background: none; border: none; width: 30px; height: 30px; cursor: pointer; }

        /* DYNAMIC BUILDER ELEMENTS */
        .build-item {
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(255,255,255,0.2);
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
        }
        .build-item:hover { border-color: var(--accent); }

        /* MODES */
        body.horizontal-mode main { flex-direction: column; }
        body.horizontal-mode .sidebar { width: 100%; height: 250px; border-right: none; border-top: 1px solid var(--border); order: 2; }
        body.horizontal-mode #export-panel { width: 100%; height: 200px; order: 3; }

        /* GENERATED ELEMENTS PREVIEW STYLES (Scoped to Preview) */
        #preview-container [contenteditable]:focus { outline: 1px solid var(--accent); background: rgba(0,242,255,0.05); }

    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">Clank.Studio // 2.0</div>
        <div class="top-nav">
            <button class="btn active" onclick="toggleMode('vertical')">Vertical Mode</button>
            <button class="btn" onclick="toggleMode('horizontal')">Horizontal Mode</button>
            <button class="btn" style="background: #22c55e; color: white;" onclick="exportProject()">Export Code</button>
        </div>
    </header>

    <main id="main-editor">
        <!-- Editor Controls -->
        <aside class="sidebar">
            <div style="display:flex; border-bottom: 1px solid var(--border);">
                <button class="btn" style="flex:1; border:none; border-radius:0;" onclick="showTab('build')">Build</button>
                <button class="btn" style="flex:1; border:none; border-radius:0;" onclick="showTab('style')">Global</button>
                <button class="btn" style="flex:1; border:none; border-radius:0;" onclick="showTab('anim')">Anim</button>
            </div>
            
            <div class="tabs-content">
                <!-- Build Tab -->
                <div id="tab-build" class="tab-pane active">
                    <div class="group">
                        <label>Add Section</label>
                        <select id="section-select">
                            <option value="hero">Hero Section</option>
                            <option value="grid">Feature Grid</option>
                            <option value="stats">Stat Meter</option>
                            <option value="graph">SVG Radar Graph</option>
                            <option value="footer">Simple Footer</option>
                        </select>
                        <button class="btn" style="width:100%" onclick="addSection()">+ Add to Layout</button>
                    </div>
                    <div class="group">
                        <label>Current Layout</label>
                        <div id="layout-list">
                            <!-- Items appear here -->
                        </div>
                    </div>
                </div>

                <!-- Style Tab -->
                <div id="tab-style" class="tab-pane">
                    <div class="group">
                        <label>Main Background</label>
                        <div class="color-row">
                            <input type="color" id="bg-color" value="#050505" oninput="updateGlobalStyle()">
                            <input type="text" id="bg-img" placeholder="Background Image URL" oninput="updateGlobalStyle()">
                        </div>
                    </div>
                    <div class="group">
                        <label>Accent Color</label>
                        <input type="color" id="accent-color" value="#00f2ff" oninput="updateGlobalStyle()">
                    </div>
                    <div class="group">
                        <label>Font (Google URL)</label>
                        <input type="text" id="font-url" placeholder="https://fonts.googleapis..." onchange="loadExternalFont()">
                    </div>
                </div>

                <!-- Animation Tab -->
                <div id="tab-anim" class="tab-pane">
                    <div class="group">
                        <label>Active Effects</label>
                        <select id="global-anim" onchange="updateGlobalStyle()">
                            <option value="none">No Effect</option>
                            <option value="scanlines">Cyber Scanlines</option>
                            <option value="noise">Film Grain</option>
                            <option value="float">Floating Elements</option>
                        </select>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Live Preview -->
        <section id="canvas-wrapper">
            <div id="preview-container">
                <!-- Content injected here -->
            </div>
        </section>

        <!-- Code Output -->
        <aside id="export-panel">
            <div style="padding: 10px; font-size: 11px; border-bottom: 1px solid var(--border); text-transform: uppercase; opacity: 0.5;">Generated Output</div>
            <pre id="code-output"></pre>
            <button class="btn" style="margin:10px" onclick="copyToClipboard()">Copy to Clipboard</button>
        </aside>
    </main>
</div>

<script>
    // --- STATE MANAGEMENT ---
    let layout = [
        { id: Date.now(), type: 'hero', title: 'FUTURE ARCHITECT', subtitle: 'Design layouts for clank.world instantly.' }
    ];

    const templates = {
        hero: (data) => `
            <section class="section hero" style="padding: 100px 40px; text-align: center; border-bottom: 1px solid var(--border);">
                <h1 contenteditable="true" style="font-size: 4rem; margin: 0; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow);">${data.title}</h1>
                <p contenteditable="true" style="opacity: 0.8; max-width: 600px; margin: 20px auto;">${data.subtitle}</p>
                <div style="margin-top: 30px;">
                    <button class="btn">GET STARTED</button>
                </div>
            </section>`,
        grid: (data) => `
            <section class="section grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 60px 40px;">
                <div class="card" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 30px; border-radius: 8px;">
                    <h3 contenteditable="true">Modular</h3>
                    <p contenteditable="true">Edit every piece of code visually.</p>
                </div>
                <div class="card" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 30px; border-radius: 8px;">
                    <h3 contenteditable="true">Responsive</h3>
                    <p contenteditable="true">Mobile first design standards.</p>
                </div>
                <div class="card" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 30px; border-radius: 8px;">
                    <h3 contenteditable="true">Fast</h3>
                    <p contenteditable="true">Pure CSS. No bloat libraries.</p>
                </div>
            </section>`,
        stats: (data) => `
            <section class="section" style="padding: 40px; display: flex; justify-content: space-around; background: rgba(0, 242, 255, 0.02);">
                <div style="text-align:center"><div style="font-size: 2.5rem; font-weight: 800; color: var(--accent);">99%</div><div style="font-size: 10px; opacity: 0.5;">UPTIME</div></div>
                <div style="text-align:center"><div style="font-size: 2.5rem; font-weight: 800; color: var(--accent);">150k</div><div style="font-size: 10px; opacity: 0.5;">USERS</div></div>
                <div style="text-align:center"><div style="font-size: 2.5rem; font-weight: 800; color: var(--accent);">0.2s</div><div style="font-size: 10px; opacity: 0.5;">LATENCY</div></div>
            </section>`,
        graph: (data) => `
            <section class="section" style="padding: 60px; text-align: center;">
                <svg width="200" height="200" viewBox="0 0 100 100" style="filter: drop-shadow(0 0 10px var(--accent));">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                    <circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="283" stroke-dashoffset="70" transform="rotate(-90 50 50)" />
                    <text x="50" y="55" text-anchor="middle" fill="white" font-size="12" font-weight="bold">80%</text>
                </svg>
                <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">NETWORK PERFORMANCE</p>
            </section>`
    };

    // --- CORE FUNCTIONS ---
    function render() {
        const container = document.getElementById('preview-container');
        const list = document.getElementById('layout-list');
        
        // Render Preview
        container.innerHTML = layout.map(item => templates[item.type](item)).join('');
        
        // Render Sidebar List
        list.innerHTML = layout.map((item, index) => `
            <div class="build-item">
                <span style="font-size: 11px;">${index + 1}. ${item.type.toUpperCase()}</span>
                <button onclick="removeSection(${index})" style="background:none; border:none; color:#ff4444; cursor:pointer;">×</button>
            </div>
        `).join('');

        generateCode();
    }

    function addSection() {
        const type = document.getElementById('section-select').value;
        layout.push({ 
            id: Date.now(), 
            type, 
            title: 'NEW SECTION', 
            subtitle: 'Click to edit this text directly in the preview.' 
        });
        render();
    }

    function removeSection(index) {
        layout.splice(index, 1);
        render();
    }

    function showTab(id) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(`tab-${id}`).classList.add('active');
    }

    function toggleMode(mode) {
        document.body.className = mode + '-mode';
        document.querySelectorAll('.top-nav .btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function updateGlobalStyle() {
        const bg = document.getElementById('bg-color').value;
        const img = document.getElementById('bg-img').value;
        const accent = document.getElementById('accent-color').value;
        const effect = document.getElementById('global-anim').value;

        const preview = document.getElementById('preview-container');
        preview.style.backgroundColor = bg;
        preview.style.backgroundImage = img ? `url(${img})` : 'none';
        
        // Dynamic CSS variables for the preview
        const cssVars = `
            #preview-container {
                --accent: ${accent};
                --accent-glow: ${accent}88;
                --border: rgba(255,255,255,0.1);
            }
            ${effect === 'scanlines' ? '#preview-container::after { content:""; position:absolute; inset:0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; }' : ''}
        `;
        
        let styleTag = document.getElementById('dynamic-preview-styles');
        if (!styleTag) {
            styleTag = document.createElement('style');
            styleTag.id = 'dynamic-preview-styles';
            document.head.appendChild(styleTag);
        }
        styleTag.innerHTML = cssVars;
        generateCode();
    }

    function generateCode() {
        const accent = document.getElementById('accent-color').value;
        const bg = document.getElementById('bg-color').value;
        const htmlContent = document.getElementById('preview-container').innerHTML;

        const output = `
<style>
:root {
  --accent: ${accent};
  --accent-glow: ${accent}80;
  --bg: ${bg};
  --border: rgba(255,255,255,0.1);
}

.clank-body {
  background: var(--bg);
  color: #fff;
  font-family: sans-serif;
  line-height: 1.6;
}

.section {
  position: relative;
  overflow: hidden;
}

.btn {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 10px 24px;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 0 15px var(--accent-glow);
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 25px var(--accent);
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr !important; }
  h1 { font-size: 2.5rem !important; }
}
</style>

<div class="clank-body">
${htmlContent.replace(/contenteditable="true"/g, '')}
</div>`.trim();

        document.getElementById('code-output').textContent = output;
    }

    function copyToClipboard() {
        const text = document.getElementById('code-output').textContent;
        navigator.clipboard.writeText(text);
        alert('Code copied to clipboard! Ready for clank.world');
    }

    // Initialize
    render();
    updateGlobalStyle();

    // Handle inline edits
    document.getElementById('preview-container').addEventListener('input', () => {
        generateCode();
    });
</script>

</body>
</html>

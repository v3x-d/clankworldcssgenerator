<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clank.World Builder</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
  <script src="generator.js"></script>
</head>
<body>

<!-- =========================================================
  APP LAYOUT
========================================================= -->
<div class="app">

  <!-- LEFT SIDEBAR / CONTROLS -->
  <aside class="sidebar">

    <div class="panel">
      <h3>SECTIONS</h3>

      <button onclick="addSection('hero')">Hero</button>
      <button onclick="addSection('navbar')">Navbar</button>
      <button onclick="addSection('cards')">Cards</button>
      <button onclick="addSection('stats')">Stats</button>
      <button onclick="addSection('features')">Features</button>
      <button onclick="addSection('profile')">Profile</button>
      <button onclick="addSection('leaderboard')">Leaderboard</button>
      <button onclick="addSection('chart')">Charts</button>
      <button onclick="addSection('footer')">Footer</button>

      <hr/>

      <button onclick="resetLayout()">Reset</button>
      <button onclick="savePreset()">Save Preset</button>
      <button onclick="loadPreset()">Load Preset</button>
    </div>

    <div class="panel">
      <h3>THEMES</h3>

      <button onclick="loadTemplate('landing')">Landing</button>
      <button onclick="loadTemplate('gaming')">Gaming</button>
      <button onclick="loadTemplate('cyberpunk')">Cyberpunk</button>
      <button onclick="loadTemplate('glass')">Glass</button>
      <button onclick="loadTemplate('stats')">Stats</button>
    </div>

    <div class="panel">
      <h3>PREVIEW</h3>

      <button onclick="setPreviewSize('desktop', this)">Desktop</button>
      <button onclick="setPreviewSize('tablet', this)">Tablet</button>
      <button onclick="setPreviewSize('mobile', this)">Mobile</button>

      <div style="margin-top:10px">
        <button onclick="zoom(0.1)">Zoom +</button>
        <button onclick="zoom(-0.1)">Zoom -</button>
        <div id="zoom-label">100%</div>
      </div>
    </div>

  </aside>

  <!-- CENTER CANVAS -->
  <main class="canvas-wrapper">

    <div id="preview-canvas" class="preview-canvas"></div>

  </main>

  <!-- RIGHT PANEL -->
  <aside class="right-panel">

    <div class="panel">
      <h3>SECTION TREE</h3>
      <div id="section-tree"></div>
    </div>

    <div class="panel">
      <h3>OUTPUT</h3>

      <button id="copy-html-btn" onclick="copyCode('html')">Copy HTML</button>
      <button id="copy-css-btn" onclick="copyCode('css')">Copy CSS</button>
      <button id="copy-full-btn" onclick="copyCode('full')">Copy FULL</button>

      <pre id="rcode-html"></pre>
      <pre id="rcode-css"></pre>
      <pre id="rcode-full"></pre>
    </div>

  </aside>

</div>
<script src="app.js"></script>
<!-- =========================================================
  CORE SCRIPT (your engine)
========================================================= -->
<script src="app.js"></script>
<script>
  window.addEventListener("DOMContentLoaded", () => {
    if (typeof loadTemplate === "function") {
      loadTemplate("landing");
    }

    if (typeof updateSectionTree === "function") {
      updateSectionTree();
    }

    if (typeof generateCode === "function") {
      generateCode();
    }

    console.log("Engine booted");
  });
</script>
</body>
</html>

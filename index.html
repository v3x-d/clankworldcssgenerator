<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLANK.STUDIO // v2.5 Architect</title>
    <style>
        :root {
            --bg: #030305;
            --panel: rgba(13, 13, 18, 0.9);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text: #e0e0e0;
            --border: rgba(255, 255, 255, 0.08);
            --glass: blur(15px) saturate(160%);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.2s ease-out; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* UI STRUCTURE */
        #app { display: flex; flex-direction: column; height: 100vh; }
        
        header {
            height: 55px;
            background: #000;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .logo-v2 { font-weight: 900; font-size: 14px; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

        main { display: flex; flex: 1; overflow: hidden; }

        /* PANELS */
        .sidebar {
            width: 350px;
            background: var(--panel);
            backdrop-filter: var(--glass);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            resize: horizontal;
            overflow: auto;
            min-width: 280px;
        }

        .panel-tab-bar { display: flex; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; text-transform: uppercase; border: none; background: none; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0,242,255,0.05); }

        .content-area { flex: 1; padding: 20px; overflow-y: auto; }

        /* INDIVIDUAL TILE EDITOR (NESTED) */
        .layout-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .item-header { padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.02); }
        .item-header:hover { background: rgba(255,255,255,0.05); }
        .item-controls { padding: 15px; border-top: 1px solid var(--border); display: none; background: #08080a; }
        .item-controls.open { display: block; }

        /* PREVIEW AREA */
        #preview-viewport {
            flex: 1;
            background: #0a0a0c;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        #device-frame {
            width: 100%;
            max-width: 1200px;
            min-height: 1000px;
            background: #000;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        /* INPUTS */
        .control-row { margin-bottom: 15px; }
        .control-row label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; background: #15151a; border: 1px solid #333; color: white; padding: 8px; border-radius: 4px; font-size: 12px; }
        .flex-row { display: flex; gap: 8px; }

        /* GENERATED ANIMATIONS */
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes cyber-flicker { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        /* UTILITY */
        .btn-action { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-action:hover { box-shadow: 0 0 15px var(--accent-glow); }
        .btn-danger { background: #ff4444; color: white; padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body class="vertical-mode">

<div id="app">
    <header>
        <div class="logo-v2">CLANK.STUDIO // V2.5</div>
        <div class="top-nav" style="display:flex; gap:10px;">
            <button class="btn-action" style="background:rgba(255,255,255,0.1); color:white;" onclick="toggleUIMode()">Toggle Layout Mode</button>
            <button class="btn-action" onclick="exportCode()">Generate & Copy Code</button>
        </div>
    </header>

    <main id="editor-core">
        <aside class="sidebar" id="main-sidebar">
            <div class="panel-tab-bar">
                <button class="tab-btn active" onclick="switchTab('build')">Build</button>
                <button class="tab-btn" onclick="switchTab('visual')">Visual</button>
                <button class="tab-btn" onclick="switchTab('anim')">Anim</button>
            </div>

            <div class="content-area">
                <!-- Build Tab -->
                <div id="tab-build" class="tab-pane active">
                    <div class="control-row">
                        <label>Add New Component</label>
                        <select id="comp-picker">
                            <option value="announcement">Announcement Banner</option>
                            <option value="marquee">Scrolling Ticker</option>
                            <option value="hero">Hero Header</option>
                            <option value="grid">Feature Grid</option>
                            <option value="card">Glass Card</option>
                            <option value="stats">Stat Cluster</option>
                        </select>
                        <button class="btn-action" style="width:100%; margin-top:10px;" onclick="addComponent()">Insert Component</button>
                    </div>
                    <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
                    <label style="font-size:10px; color:#555;">ACTIVE HIERARCHY (Click to Edit Tile)</label>
                    <div id="layout-tree" style="margin-top:10px;"></div>
                </div>

                <!-- Visual Tab -->
                <div id="tab-visual" class="tab-pane" style="display:none;">
                    <div class="control-row">
                        <label>Global Background Gradient</label>
                        <input type="text" id="global-grad" placeholder="linear-gradient(45deg, #000, #111)" oninput="updateGlobal()">
                    </div>
                    <div class="control-row">
                        <label>Accent Primary</label>
                        <input type="color" id="global-accent" value="#00f2ff" oninput="updateGlobal()">
                    </div>
                </div>

                <!-- Anim Tab -->
                <div id="tab-anim" class="tab-pane" style="display:none;">
                    <div class="control-row">
                        <label>Page Overlay</label>
                        <select id="global-overlay" onchange="updateGlobal()">
                            <option value="none">Clean</option>
                            <option value="scanlines">Scanlines</option>
                            <option value="noise">Static Noise</option>
                        </select>
                    </div>
                </div>
            </div>
        </aside>

        <section id="preview-viewport">
            <div id="device-frame">
                <!-- Live Website Rendered Here -->
            </div>
        </section>
    </main>
</div>

<script>
    // Component Database
    const comps = {
        announcement: { 
            name: "Banner", 
            html: (id, p) => `<div id="${id}" style="background:${p.bg}; padding:${p.pad}px; text-align:center; font-size:12px; color:${p.color}; border-bottom:1px solid var(--accent);">${p.text}</div>`,
            params: { text: "Limited Edition Drop - Now Live", bg: "var(--accent)", color: "#000", pad: 10 }
        },
        marquee: {
            name: "Scrolling Ticker",
            html: (id, p) => `<div id="${id}" style="overflow:hidden; white-space:nowrap; background:#111; padding:15px 0; border-bottom:1px solid var(--border);"><div style="display:inline-block; animation: marquee 20s linear infinite;">${(p.text + ' • ').repeat(10)}</div></div>`,
            params: { text: "SYSTEM STATUS: OPERATIONAL", speed: 20 }
        },
        hero: {
            name: "Hero Section",
            html: (id, p) => `<section id="${id}" style="padding:100px 40px; text-align:center; background:radial-gradient(circle at center, rgba(0,242,255,0.05), transparent);"><h1 contenteditable="true" style="font-size:3rem; margin:0;">${p.title}</h1><p contenteditable="true" style="opacity:0.6;">${p.sub}</p></section>`,
            params: { title: "NEO-GENESIS", sub: "Built for the next generation of web design." }
        },
        grid: {
            name: "Feature Grid",
            html: (id, p) => `<div id="${id}" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:${p.gap}px; padding:40px;"><div class="tile" style="background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:20px; border-radius:8px;"><h3>Modular</h3><p>Edit every piece.</p></div><div class="tile" style="background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:20px; border-radius:8px;"><h3>Fast</h3><p>Pure CSS.</p></div></div>`,
            params: { gap: 20 }
        }
    };

    let layout = [];

    function addComponent() {
        const type = document.getElementById('comp-picker').value;
        const id = 'c-' + Math.random().toString(36).substr(2, 9);
        layout.push({ id, type, params: {...comps[type].params} });
        render();
    }

    function removeComponent(id) {
        layout = layout.filter(item => item.id !== id);
        render();
    }

    function updateParam(id, key, val) {
        const item = layout.find(i => i.id === id);
        item.params[key] = val;
        render();
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-pane').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).style.display = 'block';
        event.target.classList.add('active');
    }

    function render() {
        const frame = document.getElementById('device-frame');
        const tree = document.getElementById('layout-tree');
        
        frame.innerHTML = layout.map(item => comps[item.type].html(item.id, item.params)).join('');
        
        tree.innerHTML = layout.map((item) => `
            <div class="layout-item">
                <div class="item-header" onclick="this.nextElementSibling.classList.toggle('open')">
                    ${comps[item.type].name}
                    <button class="btn-danger" onclick="removeComponent('${item.id}')">DEL</button>
                </div>
                <div class="item-controls">
                    ${Object.keys(item.params).map(key => `
                        <div class="control-row">
                            <label>${key}</label>
                            <input type="${typeof item.params[key] === 'number' ? 'number' : 'text'}" 
                                   value="${item.params[key]}" 
                                   oninput="updateParam('${item.id}', '${key}', this.value)">
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function updateGlobal() {
        const accent = document.getElementById('global-accent').value;
        const grad = document.getElementById('global-grad').value;
        const frame = document.getElementById('device-frame');
        
        frame.style.background = grad || '#000';
        document.documentElement.style.setProperty('--accent', accent);
        document.documentElement.style.setProperty('--accent-glow', accent + '66');
    }

    function exportCode() {
        const frame = document.getElementById('device-frame');
        const cleanHtml = frame.innerHTML.replace(/contenteditable="true"/g, '');
        const style = `<style>:root{--accent:${document.getElementById('global-accent').value};} body{background:#000; color:#fff; margin:0;} @keyframes marquee {0%{transform:translateX(100%);} 100%{transform:translateX(-100%);}}</style>`;
        
        navigator.clipboard.writeText(style + cleanHtml);
        alert("Full Clank-ready code copied!");
    }

    // Init
    addComponent(); // Start with one
</script>
</body>
</html>
